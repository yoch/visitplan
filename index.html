<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#17243a">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Rome Trip Map</title>
  <link rel="stylesheet" href="./src/styles.css?v=20260722d">
</head>
<body>
  <div id="map"></div>

  <header class="topbar">
    <div class="title-card">
      <div class="title-icon">🗺️</div>
      <div class="title-copy">
        <b id="day-title">Rome Trip Map</b>
        <span id="day-subtitle">Chargement…</span>
      </div>
    </div>
    <div class="pill"><span class="dot" id="status-dot"></span><span id="status-text">Chargement…</span></div>
  </header>

  <div class="controls">
    <button class="fab" id="locate" aria-label="Ma position">◎</button>
    <button class="fab" id="fit" aria-label="Voir tout">⌗</button>
  </div>

  <section class="sheet" id="sheet">
    <div class="handle" id="handle"></div>
    <div class="sheet-head">
      <div class="sheet-title"><b>Votre itinéraire</b><span id="sheet-subtitle">Carte interactive</span></div>
      <button class="toggle" id="toggle">⌃</button>
    </div>
    <div class="content" id="content"></div>
  </section>

  <script type="module" src="./src/app.js?v=20260722d"></script>
</body>
</html>
